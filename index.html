<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayşe için Küçük Bir Sürpriz</title>
    <style>
        :root { --main-pink: #ff4d6d; --main-green: #2ecc71; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background-image: url('bppg.JPG'); /* Büyük harf JPG devam */
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-color: #fff0f3;
            position: relative; transition: all 0.5s ease;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 240, 243, 0.6); z-index: 1; transition: background-color 0.5s ease;
        }
        
        /* Yeşil Göz Modu */
        body.green-mode .overlay { background-color: rgba(46, 204, 113, 0.5); }
        body.green-mode h1, body.green-mode #score, body.green-mode #green-msg { color: var(--main-green) !important; }
        #green-msg { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: var(--main-green); z-index: 30; text-align: center; width: 90%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); } }

        #game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 5; padding-top: 40px; }
        
        /* Skor bölmesi şeffaf */
        #ui { text-align: center; width: 100%; background: none; box-shadow: none; }
        
        .heart { position: absolute; font-size: 40px; cursor: pointer; user-select: none; transition: transform 0.1s; z-index: 8; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
        
        #countdown { display: none; text-align: center; background: rgba(255, 255, 255, 0.95); padding: 25px 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.25); width: 85%; max-width: 400px; border: 3px solid var(--main-pink); z-index: 20; animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes bounceIn { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        
        h1 { color: var(--main-pink); font-size: 1.6rem; margin: 0 0 15px 0; }
        #timer { font-size: 1.5rem; font-weight: 900; color: var(--main-pink); margin: 20px 0; white-space: pre-line; line-height: 1.4; }
        .confetti { position: absolute; z-index: 25; pointer-events: none; }

        /* Uçuş Rotası */
        .progress-container { width: 100%; margin: 15px 0; position: relative; }
        .locations { display: flex; justify-content: space-between; font-weight: bold; color: #555; font-size: 0.9rem; margin-bottom: 5px; }
        .progress-bar { width: 100%; height: 12px; background-color: #eee; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--main-pink), #ff8fa3); width: 0%; transition: width 1.5s ease-in-out; border-radius: 10px; }
        .plane-icon { position: absolute; top: -14px; left: 0%; font-size: 24px; transition: left 1.5s ease-in-out; }
    </style>
</head>
<body>

<div class="overlay"></div>
<div id="green-msg">💚 Yeşil Gözlerin İçin! 💚</div>

<audio id="bgMusic" loop>
    <source src="ask.mp3" type="audio/mpeg">
</audio>

<div id="game-container">
    <div id="ui">
        <h1 id="title">Ayşe'nin Kalp Avı ✨</h1>
        <div id="score-board" style="font-size: 1.3rem; font-weight: bold; color: #444;">Hedef: 20 | Skor: <span id="score" style="color: var(--main-pink);">0</span></div>
        <p id="hint" style="margin-top: 10px; font-weight: 500; color: #666;">Müzik için bir kalbe dokun!</p>
    </div>
</div>

<div id="countdown">
    <h1>Seni Çok Özledim Ayşe! ❤️‍🔥</h1>
    <div class="progress-container">
        <div class="locations">
            <span>İstanbul 🛫</span>
            <span>Mersin 🛬</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="prog-fill"></div>
        </div>
        <div class="plane-icon" id="plane-icon">✈️</div>
    </div>
    <div id="timer"></div>
    
    <p style="margin-top: 25px; font-weight: 400; color: #999; font-size: 0.95rem; font-style: italic;">
        Yeşil gözlerini görmek için sabırsızlanıyorum...
    </p>
</div>

<script>
    let score = 0;
    const target = 20;
    const music = document.getElementById('bgMusic');
    const gameContainer = document.getElementById('game-container');
    const scoreDisplay = document.getElementById('score');
    const countdownDiv = document.getElementById('countdown');
    const timerDisplay = document.getElementById('timer');
    const greenMsg = document.getElementById('green-msg');

    const heartEmojis = ['❤️', '❤️', '❤️', '❤️‍🔥', '❤️‍🔥', '❤️‍🔥', '💖', '💗', '💘', '🥰', '💚', '🌸'];

    function createHeart() {
        if (score >= target) return;
        const heart = document.createElement('div');
        heart.className = 'heart';
        if (Math.random() > 0.92) heart.innerHTML = '✈️';
        else heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        
        heart.style.left = Math.random() * (window.innerWidth - 60) + 'px';
        heart.style.top = '-70px';
        let fallDuration = Math.random() * 1.5 + 2.5; 
        heart.style.transition = `top ${fallDuration}s linear`;
        gameContainer.appendChild(heart);
        setTimeout(() => { heart.style.top = window.innerHeight + 60 + 'px'; }, 100);

        heart.onclick = () => {
            if (music.paused) { 
                music.play().catch(() => {}); 
                // Yazıyı güncelleyip kısa süre sonra yok eden kısım kanka:
                const hint = document.getElementById('hint');
                if(hint) {
                    hint.innerText = "Harikasın! 😍"; 
                    setTimeout(() => { hint.style.transition = "opacity 2s"; hint.style.opacity = '0'; }, 1500); 
                }
            }
            score++;
            scoreDisplay.innerText = score;
            
            if (score === 11) {
                document.body.classList.add('green-mode');
                greenMsg.style.display = 'block';
                setTimeout(() => {
                    document.body.classList.remove('green-mode');
                    greenMsg.style.display = 'none';
                }, 3000);
            }

            heart.style.transform = 'scale(2.5) rotate(25deg)';
            heart.style.opacity = '0';
            setTimeout(() => heart.remove(), 100);
            if (score >= target) showSurprise();
        };
        setTimeout(() => { if (heart.parentNode) heart.remove(); }, fallDuration * 1000 + 200);
    }

    const gameInterval = setInterval(createHeart, 650);

    function celebrate() {
        for(let i=0; i<30; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-30px';
            c.style.fontSize = (Math.random()*20 + 20) + 'px';
            document.body.appendChild(c);
            const duration = Math.random() * 3 + 2;
            c.animate([
                { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*300}px, ${window.innerHeight}px) rotate(720deg)`, opacity: 0 }
            ], { duration: duration * 1000, easing: 'ease-out' });
            setTimeout(() => c.remove(), duration * 1000);
        }
    }

    function showSurprise() {
        clearInterval(gameInterval);
        document.getElementById('game-container').style.display = 'none';
        document.querySelectorAll('.heart').forEach(h => h.remove());
        countdownDiv.style.display = 'block';
        celebrate();
        setInterval(celebrate, 2500); 
        startTimer();

        // KANKA: Uçak rotasını burada SADECE BİR KERE, yarım saniye gecikmeyle başlatıyoruz
        setTimeout(updateProgress, 500); 
    }

    function updateProgress() {
        // BAŞLANGIÇ TARİHİ: 11 EKİM 2025
        const startDate = new Date("October 11, 2025 00:00:00").getTime(); 
        const targetDate = new Date("January 25, 2026 00:00:00").getTime();
        const now = new Date().getTime();

        const totalDuration = targetDate - startDate;
        const elapsed = now - startDate;
        let percentage = Math.min(Math.max((elapsed / totalDuration) * 100, 0), 100);

        document.getElementById('prog-fill').style.width = percentage + '%';
        document.getElementById('plane-icon').style.left = `calc(${percentage}% - 15px)`;
    }

    function startTimer() {
        const targetDate = new Date("January 25, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            timerDisplay.innerText = `${days} GÜN\n${hours} Sa ${mins} Dk ${secs} Sn`;
            
            // KANKA: Buradaki updateProgress(); satırını sildik! 
            // Uçak artık sabit duracak.
        }, 1000);
    }
</script>
</body>
</html>
